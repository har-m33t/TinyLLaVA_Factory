# RECOUNT3 candidate projects for CVD EDA (Task 2 input).
#
# Task 2 pulls each entry via recount3::create_rse() + transform_counts()
# and exports it as Parquet. This file is the SOLE source of truth for
# which projects get ingested — the R scripts do not do keyword filtering
# themselves (that's Task 3's job).
#
# Entry schema (per group):
#   - project:       recount3 project accession (e.g. "HEART", "SRP012345")
#     project_home:  recount3 project_home bucket
#                    ("data_sources/gtex" | "data_sources/sra" | "data_sources/tcga")
#     organism:      "human" (default) or "mouse"
#     notes:         free-text human note; recorded in the ingestion log
#
# GTEx heart is the deterministic baseline. SRA candidates come from Task 3's
# LLM-based free-text CVD relevance scoring and get appended to `sra:` here
# before Task 2 is re-run.

gtex:
  - project: HEART
    project_home: data_sources/gtex
    organism: human
    notes: >-
      GTEx heart tissue. Contains both "Heart - Atrial Appendage" and
      "Heart - Left Ventricle" as gtex.smtsd values. Task 4 subsets by tissue.

sra:
  # Populated by Task 3. Example format:
  # - project: SRP012345
  #   project_home: data_sources/sra
  #   organism: human
  #   notes: "Ischemic cardiomyopathy vs. control LV biopsies (GSE12345)"
  []

tcga:
  # No cardiac primary-tumor cohorts in TCGA; kept as a placeholder so the
  # group exists if a future need appears.
  []
